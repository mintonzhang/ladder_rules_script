# HTTP 代理端口
port: 7897

# SOCKS5 代理端口
socks-port: 7891

# Linux 和 macOS 的 redir 代理端口
redir-port: 7892

# 允许局域网的连接
allow-lan: false

# 规则模式：Rule（规则） / Global（全局代理）/ Direct（全局直连）
mode: rule

# 设置日志输出级别 (默认级别：silent，即不输出任何内容，以避免因日志内容过大而导致程序内存溢出)。
# 5 个级别：silent / info / warning / error / debug。级别越高日志输出量越大，越倾向于调试，若需要请自行开启。
log-level: silent
# Clash 的 RESTful API
external-controller: '127.0.0.1:9090'

# RESTful API 的口令
secret: ''

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '+.local'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'localhost.ptlogin2.qq.com'
    - '+.miwifi.com'
    - '+.docker.io'
    - '+.market.xiaomi.com'
    - '+.push.apple.com'
    - '+.jasolar.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    '*.wocnode.com':
      - https://cdn1.nexolinkapi.com:25985/0x3f
      - https://cdn2.nexolinkapi.com/0x3f
    'geosite:cn':
      - 119.29.29.29
      - 223.5.5.5
    'geosite:geolocation-!cn':
      - 8.8.8.8
      - 1.1.1.1
    '+.jasolar.com':
      - 172.28.7.70
      - 172.28.7.71
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4


